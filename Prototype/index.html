<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CougPulse Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape shape-a" aria-hidden="true"></div>
  <div class="bg-shape shape-b" aria-hidden="true"></div>

  <main class="app-shell">
    <section id="loginScreen" class="card login-card" aria-label="Login">
      <h1>CougPulse</h1>
      <p>Campus noise intelligence at a glance.</p>
      <form id="loginForm" class="login-form">
        <label>
          Email
          <input type="email" id="email" placeholder="student@wsu.edu" required />
        </label>
        <label>
          Password
          <input type="password" id="password" placeholder="Enter password" required />
        </label>
        <button type="submit" class="btn btn-primary">Log In</button>
      </form>
    </section>

    <section id="dashboard" class="dashboard hidden" aria-label="Noise map dashboard">
      <header class="topbar card">
        <div>
          <h2>CougPulse - WSU Everett Campus Map</h2>
          <p id="modeSubtitle">Live View: Real-time room noise levels</p>
        </div>
        <button id="logoutBtn" class="btn btn-ghost" type="button">Log Out</button>
      </header>

      <section class="controls card">
        <div class="floor-selector" role="tablist" aria-label="Floor selector">
          <button class="floor-btn active" data-floor="1" type="button" role="tab" aria-selected="true">Floor 1</button>
          <button class="floor-btn" data-floor="2" type="button" role="tab" aria-selected="false">Floor 2</button>
          <button class="floor-btn" data-floor="3" type="button" role="tab" aria-selected="false">Floor 3</button>
          <button class="floor-btn" data-floor="4" type="button" role="tab" aria-selected="false">Floor 4</button>
        </div>
      </section>

      <section class="legend card" aria-label="Noise legend">
        <h4>Noise Scale</h4>
        <div class="legend-items">
          <span><i class="chip level-green"></i> Quiet</span>
          <span><i class="chip level-blue"></i> Calm</span>
          <span><i class="chip level-yellow"></i> Moderate</span>
          <span><i class="chip level-orange"></i> Busy</span>
          <span><i class="chip level-red"></i> Loud</span>
        </div>
      </section>

      <section id="predictivePanel" class="predictive-panel card hidden" aria-label="Room predictive insights">
        <div class="predictive-panel-head">
          <div>
            <h3 id="predictiveTitle">Predictive Noise</h3>
            <p id="predictiveSubtitle">Average noise level by time</p>
          </div>
          <button id="closePredictivePanel" class="close-panel" type="button" aria-label="Close predictive panel">X</button>
        </div>
        <div id="dayButtons" class="day-buttons" role="tablist" aria-label="Select day">
          <button class="day-btn active" data-day="Mon" type="button">Mon</button>
          <button class="day-btn" data-day="Tue" type="button">Tue</button>
          <button class="day-btn" data-day="Wed" type="button">Wed</button>
          <button class="day-btn" data-day="Thu" type="button">Thu</button>
          <button class="day-btn" data-day="Fri" type="button">Fri</button>
          <button class="day-btn" data-day="Sat" type="button">Sat</button>
          <button class="day-btn" data-day="Sun" type="button">Sun</button>
        </div>
        <div class="chart-shell">
          <div id="noiseChart" class="noise-chart" aria-live="polite"></div>
        </div>
      </section>

      <section class="map-card card">
        <div class="map-title-row">
          <h3 id="mapTitle">Floor 1 Map</h3>
          <div id="mapTimestamp">Updated just now</div>
        </div>
        <div id="floorMap" class="floor-map" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
